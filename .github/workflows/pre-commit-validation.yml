name: Pre-Commit Validation

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  NODE_VERSION: "18"
  FORCE_COLOR: 1

jobs:
  # Comprehensive validation that must pass before any merge
  pre-commit-validation:
    name: Pre-Commit Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Step 1: Code Formatting (MUST PASS)
      - name: 🎨 Check Code Formatting
        run: |
          echo "::group::Code Formatting Check"
          npm run format:check
          if [ $? -ne 0 ]; then
            echo "::error::Code formatting issues found. Run 'npm run format' to fix."
            exit 1
          fi
          echo "✅ Code formatting is correct"
          echo "::endgroup::"

      # Step 2: TypeScript Compilation (MUST PASS)
      - name: 🔍 TypeScript Compilation
        run: |
          echo "::group::TypeScript Compilation"
          npm run type-check
          if [ $? -ne 0 ]; then
            echo "::error::TypeScript compilation failed. Fix all type errors before committing."
            exit 1
          fi
          echo "✅ TypeScript compilation successful"
          echo "::endgroup::"

      # Step 3: ESLint (MUST PASS - NO ERRORS ALLOWED)
      - name: 📝 ESLint Validation
        run: |
          echo "::group::ESLint Validation"
          npm run lint -- --max-warnings 0
          if [ $? -ne 0 ]; then
            echo "::error::ESLint errors found. Fix all linting errors before committing."
            exit 1
          fi
          echo "✅ ESLint validation passed"
          echo "::endgroup::"

      # Step 4: Security Linting (MUST PASS - NO ERRORS ALLOWED)
      - name: 🔒 Security Linting
        run: |
          echo "::group::Security Linting"
          npm run lint:security -- --max-warnings 0
          if [ $? -ne 0 ]; then
            echo "::error::Security linting errors found. Fix all security issues before committing."
            exit 1
          fi
          echo "✅ Security linting passed"
          echo "::endgroup::"

      # Step 5: Unit Tests (MUST PASS - ALL TESTS)
      - name: 🧪 Unit Tests
        run: |
          echo "::group::Unit Tests"
          npm test -- --passWithNoTests --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'
          if [ $? -ne 0 ]; then
            echo "::error::Unit tests failed. Fix all failing tests before committing."
            exit 1
          fi
          echo "✅ All unit tests passed"
          echo "::endgroup::"

      # Step 6: Security Tests (MUST PASS - ALL TESTS)
      - name: 🛡️ Security Tests
        run: |
          echo "::group::Security Tests"
          npm run test:security
          if [ $? -ne 0 ]; then
            echo "::error::Security tests failed. Fix all security test failures before committing."
            exit 1
          fi
          echo "✅ All security tests passed"
          echo "::endgroup::"

      # Step 7: Build Validation (MUST PASS)
      - name: 🏗️ Build Validation
        run: |
          echo "::group::Build Validation"
          npm run build
          if [ $? -ne 0 ]; then
            echo "::error::Build failed. Fix all build errors before committing."
            exit 1
          fi
          echo "✅ Build successful"
          echo "::endgroup::"

      # Step 8: Dependency Security Audit (MUST PASS)
      - name: 🔍 Dependency Security Audit
        run: |
          echo "::group::Dependency Security Audit"
          npm audit --audit-level=high
          if [ $? -ne 0 ]; then
            echo "::error::High severity vulnerabilities found in dependencies. Fix before committing."
            exit 1
          fi
          echo "✅ No high severity vulnerabilities found"
          echo "::endgroup::"

      # Step 9: License Compliance Check (MUST PASS)
      - name: 📄 License Compliance
        run: |
          echo "::group::License Compliance Check"
          npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Unlicense;WTFPL;CC0-1.0;CC-BY-3.0;CC-BY-4.0' --excludePrivatePackages
          if [ $? -ne 0 ]; then
            echo "::error::License compliance issues found. Review and fix license violations."
            exit 1
          fi
          echo "✅ License compliance verified"
          echo "::endgroup::"

      # Step 10: Final Validation Summary
      - name: ✅ Validation Complete
        run: |
          echo "::notice::🎉 ALL QUALITY GATES PASSED!"
          echo "::notice::✅ Code formatting correct"
          echo "::notice::✅ TypeScript compilation successful"
          echo "::notice::✅ ESLint validation passed"
          echo "::notice::✅ Security linting passed"
          echo "::notice::✅ All unit tests passed"
          echo "::notice::✅ All security tests passed"
          echo "::notice::✅ Build successful"
          echo "::notice::✅ No security vulnerabilities"
          echo "::notice::✅ License compliance verified"
          echo "::notice::🚀 Code is ready for deployment!"

  # Additional security validation
  security-validation:
    name: Advanced Security Validation
    runs-on: ubuntu-latest
    needs: pre-commit-validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Secret scanning
      - name: 🔍 Secret Scanning
        run: |
          echo "::group::Secret Scanning"
          # Check for common secrets patterns
          if grep -r "password.*=" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.md" --exclude="*.yml" --exclude="*.yaml"; then
            echo "::error::Potential secrets found in code. Review and remove before committing."
            exit 1
          fi
          echo "✅ No secrets detected"
          echo "::endgroup::"

      # Check for TODO/FIXME in critical files
      - name: 📝 Critical TODOs Check
        run: |
          echo "::group::Critical TODOs Check"
          critical_todos=$(grep -r "TODO\|FIXME" app/api lib/security --include="*.ts" --include="*.tsx" || true)
          if [ ! -z "$critical_todos" ]; then
            echo "::warning::Critical TODOs found in security/API code:"
            echo "$critical_todos"
            echo "::error::Resolve all TODOs in critical code before committing."
            exit 1
          fi
          echo "✅ No critical TODOs found"
          echo "::endgroup::"

  # Performance and accessibility validation
  quality-validation:
    name: Quality & Performance Validation
    runs-on: ubuntu-latest
    needs: pre-commit-validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Bundle size analysis
      - name: 📦 Bundle Size Analysis
        run: |
          echo "::group::Bundle Size Analysis"
          npm run build

          # Check if bundle sizes are reasonable
          if [ -d ".next/static/chunks" ]; then
            large_chunks=$(find .next/static/chunks -name "*.js" -size +500k)
            if [ ! -z "$large_chunks" ]; then
              echo "::warning::Large bundle chunks detected:"
              ls -lh $large_chunks
              echo "::error::Bundle size too large. Optimize before committing."
              exit 1
            fi
          fi
          echo "✅ Bundle size within acceptable limits"
          echo "::endgroup::"

      # Check for console.log in production code
      - name: 🚫 Production Console Logs Check
        run: |
          echo "::group::Production Console Logs Check"
          console_logs=$(grep -r "console\." app/api lib --include="*.ts" --include="*.tsx" --exclude-dir=tests || true)
          if [ ! -z "$console_logs" ]; then
            echo "::warning::Console logs found in production code:"
            echo "$console_logs"
            echo "::error::Remove console logs from production code before committing."
            exit 1
          fi
          echo "✅ No console logs in production code"
          echo "::endgroup::"

  # Final approval gate
  deployment-ready:
    name: 🚀 Deployment Ready
    runs-on: ubuntu-latest
    needs: [pre-commit-validation, security-validation, quality-validation]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: 🎉 All Validations Passed
        run: |
          echo "::notice::🎉 CONGRATULATIONS!"
          echo "::notice::All quality gates have been successfully passed:"
          echo "::notice::✅ Code Quality Validation"
          echo "::notice::✅ Security Validation" 
          echo "::notice::✅ Performance Validation"
          echo "::notice::🚀 Code is APPROVED for deployment!"
          echo "::notice::This commit meets all enterprise standards and is ready for production."
