name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "18"

jobs:
  # Security Linting and Code Quality
  security-lint:
    name: Security Linting
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint Security Rules
        run: npx eslint . --config .eslintrc.security.json --ext .ts,.tsx,.js,.jsx --max-warnings 500
        continue-on-error: true

      - name: Run Prettier Check
        run: npx prettier --check . --config .prettierrc.security
        continue-on-error: true

      - name: TypeScript Security Check
        run: npx tsc --noEmit
        continue-on-error: true

  # Dependency Vulnerability Scanning
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=critical || true

  # Secret Scanning
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run basic secret detection
        run: |
          echo "Checking for common secrets..."
          if grep -r "password.*=" . --exclude-dir=node_modules --exclude-dir=.git || true; then
            echo "Found potential secrets - review manually"
          fi

  # Security Test Suite
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security-focused unit tests
        run: npm run test:security || true
        env:
          NODE_ENV: test

  # License Compliance
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;Unlicense;WTFPL;CC0-1.0;CC-BY-3.0;CC-BY-4.0' --excludePrivatePackages || true

  # Security Report Generation
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs:
      [
        security-lint,
        dependency-scan,
        secret-scan,
        security-tests,
        license-check,
      ]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Security Summary
        run: |
          echo "# Security Pipeline Report" > security-report.md
          echo "Generated on: $(date)" >> security-report.md
          echo "" >> security-report.md
          echo "## Job Status" >> security-report.md
          echo "- Security Linting: ${{ needs.security-lint.result }}" >> security-report.md
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> security-report.md
          echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> security-report.md
          echo "- Security Tests: ${{ needs.security-tests.result }}" >> security-report.md
          echo "- License Check: ${{ needs.license-check.result }}" >> security-report.md

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

  # Notify on Security Issues
  security-notification:
    name: Security Notifications
    runs-on: ubuntu-latest
    needs: [security-lint, dependency-scan, secret-scan, security-tests]
    if: failure()
    continue-on-error: true
    steps:
      - name: Security Alert Placeholder
        run: |
          echo "🚨 Security pipeline had failures - review the security issues"
          echo "This would send alerts in production environment"
